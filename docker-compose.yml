services:
  backend:
    build: ./backend
    image: shorten-rs-backend
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      DATABASE_URL: sqlite:/data/database.sqlite
    volumes:
      - backend-data:/data
    healthcheck:
      # Any HTTP response (even 404) means the server is accepting requests;
      # plain curl (no -f) exits 0 as long as it connects.
      test: ["CMD-SHELL", "curl -s -o /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: shorten-rs-frontend
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
